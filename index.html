<!DOCTYPE html>    
<div class="brand-sub en">Global Medical Protection Brand</div>    
<div class="brand-sub fr">Marque Mondiale De Protection Médicale</div>
    <h2 class="page-tit zh">联系我们</h2>    
<h2 class="page-tit en">Contact Us</h2>    
<h2 class="page-tit fr">Contactez-Nous</h2>    
<div class="contact-foot">        
<a href="http://wa.me/212702298888" target="_blank" class="wa-link">            
<span class="zh">WhatsApp 全球商务对接</span>            
<span class="en">WhatsApp Global Business Contact</span>            
<span class="fr">Contact Commercial Global WhatsApp</span>        
</a >        
<p class="domain-text">vexorion.ma</p >    
</div>
</div>
<!-- 简易后台 -->
<div class="admin-box" id="adminPanel">    
<h3>📝 网站内容简易后台</h3>    
<p>公司简介中文：</p >    
<textarea id="editAboutZh"></textarea>    
<p>产品发布中文：</p >    
<textarea id="editProZh"></textarea>    
<p>产品溯源中文：</p >    
<textarea id="editTraceZh"></textarea>    
<button class="admin-btn" onclick="saveData()">一键保存修改</button>    
<button class="admin-btn" onclick="closeAdmin()">关闭后台</button>
</div>
<script>
function showPage(id){    
document.querySelectorAll(".page-box").forEach(item=>item.style.display="none");    
document.getElementById(id).style.display="block";
}
function setLang(lang){    
document.querySelectorAll(".zh,.en,.fr").forEach(el=>el.style.display="none");    
document.querySelectorAll("."+lang).forEach(el=>el.style.display="block");
}
function saveData(){
document.getElementById("aboutZh").innerText=document.getElementById("editAboutZh").value;
document.getElementById("proZh").innerText=document.getElementById("editProZh").value;
document.getElementById("traceZh").innerText=document.getElementById("editTraceZh").value;
localStorage.setItem("abz",document.getElementById("editAboutZh").value);
localStorage.setItem("proz",document.getElementById("editProZh").value);
localStorage.setItem("trz",document.getElementById("editTraceZh").value);
alert("内容保存成功！");
}
function openAdmin(){
document.getElementById("adminPanel").style.display="block";
document.getElementById("editAboutZh").value=localStorage.getItem("abz")||"";
document.getElementById("editProZh").value=localStorage.getItem("proz")||"";
document.getElementById("editTraceZh").value=localStorage.getItem("trz")||"";
}
function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}
if(location.search=="?admin")openAdmin();
window.onload=function(){
if(localStorage.getItem("abz"))document.getElementById("aboutZh").innerText=localStorage.getItem("abz");
if(localStorage.getItem("proz"))document.getElementById("proZh").innerText=localStorage.getItem("proz");
if(localStorage.getItem("trz"))document.getElementById("traceZh").innerText=localStorage.getItem("trz");
setLang('zh');
}
</script>
</body>
</html>
